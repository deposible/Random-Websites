<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saber Simulator — Class Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#12121c;--bg3:#1a1a2e;--bg4:#222240;
  --accent:#00e5ff;--accent2:#7c4dff;--accent3:#ff4081;
  --gold:#ffd740;--text:#e0e0e8;--text2:#8888a0;
  --glow:0 0 20px rgba(0,229,255,.3);
  --card-radius:12px;
}
html{scroll-behavior:smooth}
body{
  font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:radial-gradient(ellipse at 20% 0%,rgba(124,77,255,.08) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 100%,rgba(0,229,255,.06) 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

/* HEADER */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,15,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,229,255,.15);
  padding:16px 24px;
}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:1.4rem;letter-spacing:2px}
.logo span{color:var(--accent)}
.logo .sub{font-size:.7rem;color:var(--text2);letter-spacing:4px;display:block;font-weight:400}

/* STATS BAR */
.stats-bar{
  display:flex;gap:20px;align-items:center;flex-wrap:wrap;
}
.stat{text-align:center}
.stat-val{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700;color:var(--accent)}
.stat-label{font-size:.65rem;color:var(--text2);letter-spacing:2px;text-transform:uppercase}

/* MAIN */
.main{max-width:1200px;margin:0 auto;padding:20px 24px 60px;position:relative;z-index:1}

/* CURRENT CLASS CARD */
.current-card{
  background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid rgba(0,229,255,.2);border-radius:16px;
  padding:28px 32px;margin-bottom:24px;position:relative;overflow:hidden;
}
.current-card::before{
  content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;
  background:radial-gradient(circle,rgba(0,229,255,.1),transparent 70%);
  pointer-events:none;
}
.current-card h2{font-family:'Orbitron',sans-serif;font-size:.75rem;letter-spacing:4px;color:var(--text2);margin-bottom:12px;text-transform:uppercase}
.current-class-name{font-family:'Orbitron',sans-serif;font-size:2rem;font-weight:900;color:var(--accent);margin-bottom:4px}
.current-meta{font-size:.9rem;color:var(--text2);margin-bottom:16px}
.current-meta strong{color:var(--gold)}

/* SELECT DROPDOWN */
.select-wrap{position:relative;display:inline-block;margin-bottom:16px}
.select-wrap select{
  appearance:none;background:var(--bg);border:1px solid rgba(0,229,255,.3);
  color:var(--text);padding:10px 40px 10px 16px;border-radius:8px;
  font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;
  cursor:pointer;min-width:220px;
}
.select-wrap select:focus{outline:none;border-color:var(--accent);box-shadow:var(--glow)}
.select-wrap::after{
  content:'▾';position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:var(--accent);pointer-events:none;font-size:1.1rem;
}

/* GOAL SECTION */
.goal-section{
  background:var(--bg2);border:1px solid rgba(124,77,255,.2);border-radius:12px;
  padding:20px 24px;margin-bottom:24px;
}
.goal-section h3{font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:3px;color:var(--accent2);margin-bottom:12px;text-transform:uppercase}
.goal-info{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:14px}
.goal-class-name{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:700;color:var(--text)}
.goal-mult{font-size:.85rem;color:var(--gold)}

/* PROGRESS BAR */
.progress-wrap{margin-top:8px}
.progress-labels{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text2);margin-bottom:6px}
.progress-labels .pct{color:var(--accent);font-weight:700;font-family:'Orbitron',sans-serif}
.progress-track{
  height:10px;background:var(--bg);border-radius:99px;overflow:hidden;
  border:1px solid rgba(0,229,255,.1);
}
.progress-fill{
  height:100%;border-radius:99px;transition:width .6s ease;
  background:linear-gradient(90deg,var(--accent2),var(--accent));
  box-shadow:0 0 12px rgba(0,229,255,.4);
}
.classes-between{font-size:.8rem;color:var(--text2);margin-top:8px}
.classes-between strong{color:var(--accent)}

/* SEARCH & FILTER */
.toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-box{
  flex:1;min-width:200px;background:var(--bg2);border:1px solid rgba(0,229,255,.15);
  border-radius:8px;padding:10px 16px;color:var(--text);
  font-family:'Rajdhani',sans-serif;font-size:1rem;
}
.search-box:focus{outline:none;border-color:var(--accent);box-shadow:var(--glow)}
.search-box::placeholder{color:var(--text2)}
.filter-btn{
  padding:8px 16px;border-radius:8px;border:1px solid rgba(0,229,255,.15);
  background:var(--bg2);color:var(--text2);font-family:'Rajdhani',sans-serif;
  font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s;
}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.05)}

/* CLASS LIST */
.class-grid{display:flex;flex-direction:column;gap:4px}
.class-row{
  display:grid;grid-template-columns:50px 1fr 160px 160px;align-items:center;
  padding:10px 16px;border-radius:8px;background:var(--bg2);
  border:1px solid transparent;transition:.2s;cursor:pointer;gap:8px;
}
.class-row:hover{border-color:rgba(0,229,255,.2);background:var(--bg3)}
.class-row.current{
  border-color:var(--accent);background:rgba(0,229,255,.05);
  box-shadow:inset 0 0 30px rgba(0,229,255,.03);
}
.class-row.completed{opacity:.55}
.class-row.goal-row{border-color:var(--accent2);background:rgba(124,77,255,.05)}
.class-rank{
  font-family:'Orbitron',sans-serif;font-size:.75rem;font-weight:700;
  color:var(--text2);text-align:center;
}
.class-row.current .class-rank{color:var(--accent)}
.class-name-cell{font-weight:600;font-size:1rem}
.class-row.current .class-name-cell{color:var(--accent)}
.class-row.goal-row .class-name-cell{color:var(--accent2)}
.class-mult{font-size:.8rem;color:var(--gold);font-weight:500}
.class-cost{font-size:.8rem;color:var(--text2);text-align:right;font-weight:500}
.class-row.completed .class-name-cell::after{
  content:' ✓';color:rgba(0,229,255,.5);font-size:.8rem;
}

/* CROWN INDICATOR */
.crown-mult{font-size:.7rem;color:var(--accent2);margin-top:2px}

/* TAG */
.tag{
  display:inline-block;padding:2px 8px;border-radius:4px;font-size:.6rem;
  font-family:'Orbitron',sans-serif;letter-spacing:1px;font-weight:700;margin-left:8px;
}
.tag.you{background:rgba(0,229,255,.15);color:var(--accent)}
.tag.goal{background:rgba(124,77,255,.15);color:var(--accent2)}

/* MOBILE */
@media(max-width:700px){
  .class-row{grid-template-columns:40px 1fr 100px;font-size:.9rem}
  .class-cost{display:none}
  .header-inner{flex-direction:column;align-items:flex-start}
  .current-class-name{font-size:1.4rem}
}

/* SCROLL INDICATOR */
.scroll-top{
  position:fixed;bottom:24px;right:24px;width:44px;height:44px;
  border-radius:50%;background:var(--accent);color:var(--bg);
  display:none;align-items:center;justify-content:center;
  font-size:1.2rem;cursor:pointer;z-index:99;border:none;
  box-shadow:0 4px 20px rgba(0,229,255,.4);
}
.scroll-top.show{display:flex}

/* COUNT */
.list-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px;padding:0 4px;
}
.list-header h3{font-family:'Orbitron',sans-serif;font-size:.7rem;letter-spacing:3px;color:var(--text2);text-transform:uppercase}
.count{font-size:.8rem;color:var(--text2)}
</style>
</head>

<div class="header">

    <div class="logo">SABER<span>SIM</span><span class="sub">CLASS TRACKER</span></div>

  <div class="goal-section">

      <div class="select-wrap">
        <select id="goalSelect"></select>
      </div>
    </div>
    <div class="goal-info">
      <div class="goal-class-name" id="goalName"></div>
      <div class="goal-mult" id="goalMult"></div>
    </div>
    <div class="progress-wrap" id="progressWrap"></div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-box" id="searchBox" placeholder="Search classes...">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" data-filter="completed" onclick="setFilter('completed',this)">Completed</button>
    <button class="filter-btn" data-filter="upcoming" onclick="setFilter('upcoming',this)">Upcoming</button>
  </div>

  <div class="list-header">
    <h3>All Classes</h3>
    <div class="count" id="listCount"></div>
  </div>
  <div class="class-grid" id="classGrid"></div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0})">↑</button>

{name:"Poltergeist",mult:"x37.5t",crown:"x408q",cost:"91.8kBQ"},
{name:"Helios",mult:"x45t",crown:"x489q",cost:"13.8kBR"},
{name:"Chaos Omen",mult:"x54t",crown:"x587q",cost:"2.06kBS"},
{name:"Cursed Satyr",mult:"x64.8t",crown:"x704q",cost:"310kBS"},
{name:"Apollo",mult:"x77.8t",crown:"x845q",cost:"46.5kBT"},
{name:"Banshee",mult:"x93.4t",crown:"x1.01Q",cost:"6.97kBU"},
{name:"Viking",mult:"x112t",crown:"x1.21Q",cost:"1.05kBV"},
{name:"Sasquatch",mult:"x134t",crown:"x1.45Q",cost:"158kBV"},
{name:"Cupid",mult:"x161t",crown:"x1.81Q",cost:"23.7kBW"},
{name:"Mecha",mult:"x193t",crown:"x2.17Q",cost:"3.56kBX"},
];

let currentIdx=0,goalIdx=CLASSES.length-1,filter='all',searchTerm='';

function init(){
  const saved=localStorage.getItem('saber_current');
  const savedGoal=localStorage.getItem('saber_goal');
  if(saved!==null)currentIdx=parseInt(saved);
  if(savedGoal!==null)goalIdx=parseInt(savedGoal);
  if(goalIdx<=currentIdx)goalIdx=Math.min(currentIdx+1,CLASSES.length-1);

  const cs=document.getElementById('currentSelect');
  const gs=document.getElementById('goalSelect');
  CLASSES.forEach((c,i)=>{
    cs.innerHTML+=`<option value="${i}">${i+1}. ${c.name}</option>`;
    gs.innerHTML+=`<option value="${i}">${i+1}. ${c.name}</option>`;
  });
  cs.value=currentIdx;
  gs.value=goalIdx;
  cs.addEventListener('change',e=>{currentIdx=parseInt(e.target.value);if(goalIdx<=currentIdx)goalIdx=Math.min(currentIdx+1,CLASSES.length-1);gs.value=goalIdx;save();render()});
  gs.addEventListener('change',e=>{goalIdx=parseInt(e.target.value);if(goalIdx<=currentIdx)goalIdx=currentIdx;gs.value=goalIdx;save();render()});
  document.getElementById('searchBox').addEventListener('input',e=>{searchTerm=e.target.value.toLowerCase();renderList()});
  window.addEventListener('scroll',()=>{document.getElementById('scrollTop').classList.toggle('show',window.scrollY>400)});
  render();
}

function save(){localStorage.setItem('saber_current',currentIdx);localStorage.setItem('saber_goal',goalIdx)}

function render(){
  const c=CLASSES[currentIdx];
  document.getElementById('currentName').textContent=c.name;
  let meta=`Rank #${currentIdx+1} of ${CLASSES.length} — Strength ${c.mult}`;
  if(c.crown)meta+=` — Crown ${c.crown}`;
  document.getElementById('currentMeta').innerHTML=meta;

  const g=CLASSES[goalIdx];
  document.getElementById('goalName').textContent=g.name;
  let gm=`Strength ${g.mult}`;
  if(g.crown)gm+=` | Crown ${g.crown}`;
  document.getElementById('goalMult').textContent=gm;

  // progress
  const pw=document.getElementById('progressWrap');
  if(goalIdx<=currentIdx){
    pw.innerHTML=`<div style="color:var(--accent);font-family:'Orbitron',sans-serif;font-size:.85rem">✦ GOAL REACHED ✦</div>`;
  }else{
    const pct=Math.round((currentIdx/(goalIdx))*100);
    const diff=goalIdx-currentIdx;
    pw.innerHTML=`
      <div class="progress-labels"><span>${c.name} → ${g.name}</span><span class="pct">${pct}%</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="classes-between"><strong>${diff}</strong> class${diff>1?'es':''} to go — Next up: <strong>${CLASSES[Math.min(currentIdx+1,CLASSES.length-1)].name}</strong> (${CLASSES[Math.min(currentIdx+1,CLASSES.length-1)].cost} coins)</div>
    `;
  }

  // stats
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-val">${currentIdx+1}/${CLASSES.length}</div><div class="stat-label">Rank</div></div>
    <div class="stat"><div class="stat-val">${c.mult}</div><div class="stat-label">Strength</div></div>
    <div class="stat"><div class="stat-val">${Math.round((currentIdx/(CLASSES.length-1))*100)}%</div><div class="stat-label">Complete</div></div>
  `;

  renderList();
}

function renderList(){
  const grid=document.getElementById('classGrid');
  let html='';let shown=0;
  CLASSES.forEach((c,i)=>{
    const completed=i<currentIdx;
    const isCurrent=i===currentIdx;
    const isGoal=i===goalIdx;
    if(filter==='completed'&&!completed&&!isCurrent)return;
    if(filter==='upcoming'&&(completed||isCurrent))return;
    if(searchTerm&&!c.name.toLowerCase().includes(searchTerm))return;
    shown++;
    let cls='class-row';
    if(completed)cls+=' completed';
    if(isCurrent)cls+=' current';
    if(isGoal&&!isCurrent)cls+=' goal-row';
    let tags='';
    if(isCurrent)tags+=`<span class="tag you">YOU</span>`;
    if(isGoal&&!isCurrent)tags+=`<span class="tag goal">GOAL</span>`;
    let crownHtml=c.crown?`<div class="crown-mult">👑 ${c.crown}</div>`:'';
    html+=`<div class="${cls}" onclick="jumpTo(${i})">
      <div class="class-rank">#${i+1}</div>
      <div><div class="class-name-cell">${c.name}${tags}</div>${crownHtml}</div>
      <div class="class-mult">⚔ ${c.mult}</div>
      <div class="class-cost">${c.cost} coins</div>
    </div>`;
  });
  grid.innerHTML=html;
  document.getElementById('listCount').textContent=`${shown} shown`;
}

function jumpTo(i){
  currentIdx=i;
  document.getElementById('currentSelect').value=i;
  if(goalIdx<=currentIdx)goalIdx=Math.min(currentIdx+1,CLASSES.length-1);
  document.getElementById('goalSelect').value=goalIdx;
  save();render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

init();
</script>
</body>
</html>
